<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sebastián Villegas | Portafolio</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --text: #1e293b;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: white;
            padding: 3rem;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        h1 {
            margin: 0 0 0.5rem 0;
            font-size: 2rem;
            color: #0f172a;
        }
        h2 {
            margin: 0 0 1.5rem 0;
            font-size: 1.1rem;
            color: var(--primary);
            font-weight: 500;
        }
        p {
            line-height: 1.6;
            margin-bottom: 2rem;
            color: #475569;
        }
        .links a {
            display: inline-block;
            padding: 0.6rem 1.2rem;
            background-color: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 0.5rem;
            font-weight: 500;
            transition: background-color 0.2s;
        }
        .links a:hover {
            background-color: #1d4ed8;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Sebastián Villegas</h1>
        <h2>Analista de Sistemas & Desarrollador</h2>
        <p>Especialista en gestión de datos, automatización y desarrollo de soluciones tecnológicas. Próximamente compartiendo proyectos y repositorios.</p>
        <div class="links">
            <a href="https://github.com/Zookeeperboy" target="_blank" rel="noopener noreferrer">Ver GitHub</a>
        </div>
    </div>
</body>
</html>
